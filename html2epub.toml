[book]
title = "Building Embodied AI"
subtitle = "From Perception to Autonomous Action"
language = "en"
identifier = "urn:uuid:building-embodied-ai-2026-web-first"
publisher = "Apartsin & Aperstein"
rights = "Copyright (c) 2026 Alexander Apartsin and Yehudit Aperstein. All rights reserved."
publication_date = "2026-06-18"
description = "A comprehensive hands-on guide to building embodied AI systems, from robotics foundations and perception to reinforcement learning, robot data, world models, safety, deployment, capstones, and course design."
keywords = [
  "embodied AI",
  "robot learning",
  "robotics",
  "reinforcement learning",
  "simulation",
  "SLAM",
  "vision-language-action models",
  "world models",
  "human-robot interaction",
  "robot safety"
]

[[book.authors]]
name = "Alexander Apartsin"
file_as = "Apartsin, Alexander"
role = "aut"

[[book.authors]]
name = "Yehudit Aperstein"
file_as = "Aperstein, Yehudit"
role = "aut"

[content]
source_dir = "."
spine = "auto"
front_matter_dir = "front-matter"
parts_glob = "part-*"
module_glob = "module-*"
appendices_dir = "appendices"
section_glob = "section-*.html"

[styling]
stylesheets = ["styles/book.css", "styles/pygments.css"]

[fonts]
include = []
rewrite_katex_to_woff2_only = true

[math]
render = "katex"
node_exe = "node"
katex_path = "vendor/katex"

[images]
max_side = 1100
jpeg_quality = 72
compress_pngs = true

[cover]
path = "images/book-cover.jpg"

[transforms]
wide_table_min_cols = 6
slim_index_lists = true
drop_inline_style_over = 1500
drop_selectors = [".no-epub", "script[src*='analytics']", ".header-search"]

[output]
epub = "KDP/output/building-embodied-ai.epub"

[optimize]
repair_entities = true
